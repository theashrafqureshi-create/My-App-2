name: Build Original Full Integrated Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Job
      uses: actions/checkout@v4

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Configure Clean Gradle Settings
      run: |
        mkdir -p app/libs
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "My-App-2"
        include ':app'
        EOF

    - name: Write Shadowsocks Compliant Gradle Structure
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }

        android {
            namespace 'com.ashraf.whatsappvpn'
            compileSdk 34

            defaultConfig {
                applicationId "com.ashraf.whatsappvpn"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                    shrinkResources false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
                debug {
                    minifyEnabled false
                    shrinkResources false
                }
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            
            kotlinOptions {
                jvmTarget = '17'
            }
        }

        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
            implementation 'com.google.zxing:core:3.4.1'
        }
        EOF

    - name: Configure Manifest with Shadowsocks Service and Permissions
      run: |
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            
            <application
                android:allowBackup="true"
                android:icon="@android:drawable/sym_def_app_icon"
                android:roundIcon="@android:drawable/sym_def_app_icon"
                android:label="WhatsApp VPN"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                
                <activity
                    android:name=".ui.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <activity
                    android:name=".ui.SettingsActivity"
                    android:exported="false" />

                <service 
                    android:name="com.ashraf.whatsappvpn.service.ShadowsocksVpnService"
                    android:permission="android.permission.BIND_VPN_SERVICE"
                    android:exported="false">
                    <intent-filter>
                        <action android:name="android.net.VpnService" />
                    </intent-filter>
                </service>
            </application>
        </manifest>
        EOF

    - name: Inject WhatsApp Theme Colors and Textures
      run: |
        mkdir -p app/src/main/res/values
        cat << 'EOF' > app/src/main/res/values/colors.xml
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="whatsapp_green">#075E54</color>
            <color name="whatsapp_light_green">#25D366</color>
            <color name="whatsapp_bg">#F4F7F5</color>
            <color name="vpn_red">#E53935</color>
            <color name="white">#FFFFFF</color>
            <color name="black">#000000</color>
            <color name="gray">#888888</color>
        </resources>
        EOF

    - name: Inject Round Glow Button and Layout Background Styles
      run: |
        mkdir -p app/src/main/res/drawable
        
        # Disconnected State (Red Glow Round Button)
        cat << 'EOF' > app/src/main/res/drawable/btn_disconnected_glow.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android"
            android:shape="oval">
            <solid android:color="#E53935" />
            <stroke android:width="4dp" android:color="#FFCDD2" />
            <size android:width="140dp" android:height="140dp" />
        </shape>
        EOF

        # Connected State (Green Glow Round Button)
        cat << 'EOF' > app/src/main/res/drawable/btn_connected_glow.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android"
            android:shape="oval">
            <solid android:color="#25D366" />
            <stroke android:width="4dp" android:color="#C8E6C9" />
            <size android:width="140dp" android:height="140dp" />
        </shape>
        EOF

        # Greeting Banner Background Design
        cat << 'EOF' > app/src/main/res/drawable/banner_bg.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FFFFFF" />
            <corners android:radius="12dp" />
            <stroke android:width="2dp" android:color="#075E54" />
        </shape>
        EOF

        # Edit Text Box Border Design for Settings
        cat << 'EOF' > app/src/main/res/drawable/edit_text_border.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#FFFFFF" />
            <corners android:radius="6dp" />
            <stroke android:width="1dp" android:color="#075E54" />
        </shape>
        EOF

    - name: Inject WhatsApp Styled Layout with Greeting Banner and Settings Anchor
      run: |
        mkdir -p app/src/main/res/layout
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#F4F7F5">

            <!-- Action Bar with Settings Button on Top Right -->
            <RelativeLayout
                android:id="@+id/topBar"
                android:layout_width="match_parent"
                android:layout_height="56dp"
                android:background="#075E54"
                android:paddingLeft="16dp"
                android:paddingRight="16dp">
                
                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="WhatsApp VPN"
                    android:textColor="#FFFFFF"
                    android:textSize="18sp"
                    android:layout_centerVertical="true"
                    android:textStyle="bold"/>

                <Button
                    android:id="@+id/btnSettings"
                    android:layout_width="40dp"
                    android:layout_height="40dp"
                    android:layout_alignParentEnd="true"
                    android:layout_centerVertical="true"
                    android:text="⚙"
                    android:textColor="#FFFFFF"
                    android:background="@android:color/transparent"
                    android:textSize="20sp"
                    android:textStyle="bold" />
            </RelativeLayout>

            <!-- Circular Connection Engine Button -->
            <Button
                android:id="@+id/btnConnect"
                android:layout_width="140dp"
                android:layout_height="140dp"
                android:layout_centerInParent="true"
                android:background="@drawable/btn_disconnected_glow"
                android:text="CONNECT\nENGINE"
                android:textColor="#FFFFFF"
                android:gravity="center"
                android:textStyle="bold"
                android:textSize="14sp"/>

            <!-- Dismissible First-Time Greeting Banner -->
            <RelativeLayout
                android:id="@+id/greetingBanner"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:layout_alignParentBottom="true"
                android:layout_margin="16dp"
                android:padding="16dp"
                android:background="@drawable/banner_bg"
                android:visibility="visible">

                <TextView
                    android:id="@+id/txtWelcome"
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="Welcome to WhatsApp VPN!"
                    android:textColor="#075E54"
                    android:textSize="16sp"
                    android:textStyle="bold"/>

                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:layout_below="@id/txtWelcome"
                    android:layout_marginTop="4dp"
                    android:layout_toStartOf="@+id/btnCloseBanner"
                    android:textColor="#888888"
                    android:text="Secure your chats and calls instantly with our fully integrated proxy tunnel."
                    android:textSize="12sp"/>

                <Button
                    android:id="@+id/btnCloseBanner"
                    android:layout_width="32dp"
                    android:layout_height="32dp"
                    android:layout_alignParentEnd="true"
                    android:layout_alignParentTop="true"
                    android:text="X"
                    android:textColor="#E53935"
                    android:background="@android:color/transparent"
                    android:textStyle="bold"
                    android:textSize="14sp"/>
            </RelativeLayout>

        </RelativeLayout>
        EOF

    - name: Inject Full Integration Settings Layout Page
      run: |
        cat << 'EOF' > app/src/main/res/layout/activity_settings.xml
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:background="#F4F7F5">

            <!-- Settings Top Header Bar -->
            <RelativeLayout
                android:layout_width="match_parent"
                android:layout_height="56dp"
                android:background="#075E54"
                android:padding="16dp">
                
                <TextView
                    android:id="@+id/btnBack"
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="←  "
                    android:textColor="#FFFFFF"
                    android:textSize="20sp"
                    android:textStyle="bold"
                    android:layout_centerVertical="true"/>

                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:layout_toEndOf="@id/btnBack"
                    android:text="VPN Configuration Settings"
                    android:textColor="#FFFFFF"
                    android:textSize="18sp"
                    android:layout_centerVertical="true"
                    android:textStyle="bold"/>
            </RelativeLayout>

            <ScrollView
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:padding="16dp">

                <LinearLayout
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:orientation="vertical">

                    <!-- Section: Shadowsocks 3X Link Paste -->
                    <TextView
                        android:layout_width="wrap_content"
                        android:layout_height="wrap_content"
                        android:text="Import Shadowsocks Configuration"
                        android:textColor="#075E54"
                        android:textStyle="bold"
                        android:textSize="16sp"
                        android:layout_marginBottom="8dp"/>

                    <EditText
                        android:id="@+id/etVpnLink"
                        android:layout_width="match_parent"
                        android:layout_height="100dp"
                        android:background="@drawable/edit_text_border"
                        android:hint="Paste your ss:// 3X proxy server configuration link here..."
                        android:padding="12dp"
                        android:gravity="top|start"
                        android:textSize="14sp"
                        android:textColor="#000000" />

                    <Button
                        android:id="@+id/btnSaveLink"
                        android:layout_width="match_parent"
                        android:layout_height="wrap_content"
                        android:backgroundTint="#075E54"
                        android:text="SAVE CONFIGURATION LINK"
                        android:textColor="#FFFFFF"
                        android:layout_marginTop="10dp"
                        android:textStyle="bold"/>

                    <View
                        android:layout_width="match_parent"
                        android:layout_height="1dp"
                        android:background="#DDDDDD"
                        android:layout_marginTop="20dp"
                        android:layout_marginBottom="20dp"/>

                    <!-- Section: Smart QR Scanner and Gallery Hub -->
                    <TextView
                        android:layout_width="wrap_content"
                        android:layout_height="wrap_content"
                        android:text="Scan Configuration Barcode"
                        android:textColor="#075E54"
                        android:textStyle="bold"
                        android:textSize="16sp"
                        android:layout_marginBottom="8dp"/>

                    <Button
                        android:id="@+id/btnOpenScanner"
                        android:layout_width="match_parent"
                        android:layout_height="55dp"
                        android:backgroundTint="#25D366"
                        android:text="📷  OPEN QR CAMERA SCANNER"
                        android:textColor="#FFFFFF"
                        android:textStyle="bold"
                        android:layout_marginBottom="10dp"/>

                    <Button
                        android:id="@+id/btnOpenGallery"
                        android:layout_width="match_parent"
                        android:layout_height="55dp"
                        android:backgroundTint="#FFFFFF"
                        android:text="🖼️  CHOOSE FROM GALLERY SCREENSHOT"
                        android:textColor="#075E54"
                        android:textStyle="bold"
                        strokeWidth="2dp"
                        strokeColor="#075E54"/>
                </LinearLayout>
            </ScrollView>
        </LinearLayout>
        EOF

    - name: Inject Pure Kotlin Logic with Shadowsocks Engine
      run: |
        mkdir -p app/src/main/java/com/ashraf/whatsappvpn/ui
        cat << 'EOF' > app/src/main/java/com/ashraf/whatsappvpn/ui/MainActivity.kt
        package com.ashraf.whatsappvpn.ui

        import android.content.Intent
        import android.net.VpnService
        import android.os.Bundle
        import android.view.View
        import android.widget.Button
        import android.widget.RelativeLayout
        import android.widget.Toast
        import androidx.appcompat.app.AppCompatActivity
        import com.ashraf.whatsappvpn.R
        import com.ashraf.whatsappvpn.service.ShadowsocksVpnService

        class MainActivity : AppCompatActivity() {

            private var isConnected = false

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)

                val btnConnect = findViewById<Button>(R.id.btnConnect)
                val greetingBanner = findViewById<RelativeLayout>(R.id.greetingBanner)
                val btnCloseBanner = findViewById<Button>(R.id.btnCloseBanner)
                val btnSettings = findViewById<Button>(R.id.btnSettings)

                btnCloseBanner.setOnClickListener {
                    greetingBanner.visibility = View.GONE
                }

                // सेटिंग्स आइकॉन पर क्लिक करने से नया पेज खुलता है
                btnSettings.setOnClickListener {
                    val intent = Intent(this, SettingsActivity::class.java)
                    startActivity(intent)
                }

                btnConnect.setOnClickListener {
                    if (!isConnected) {
                        val intent = VpnService.prepare(this)
                        if (intent != null) {
                            startActivityForResult(intent, 0)
                        } else {
                            onActivityResult(0, RESULT_OK, null)
                        }
                    } else {
                        stopVpnService()
                        btnConnect.text = "CONNECT\nENGINE"
                        btnConnect.setBackgroundResource(R.drawable.btn_disconnected_glow)
                        Toast.makeText(this, "VPN Disconnected", Toast.LENGTH_SHORT).show()
                        isConnected = false
                    }
                }
            }

            override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                super.onActivityResult(requestCode, resultCode, data)
                if (resultCode == RESULT_OK) {
                    startVpnService()
                    val btnConnect = findViewById<Button>(R.id.btnConnect)
                    btnConnect.text = "DISCONNECT"
                    btnConnect.setBackgroundResource(R.drawable.btn_connected_glow)
                    Toast.makeText(this, "VPN Connected Successfully!", Toast.LENGTH_SHORT).show()
                    isConnected = true
                }
            }

            private fun startVpnService() {
                val intent = Intent(this, ShadowsocksVpnService::class.java).apply {
                    action = "START"
                }
                if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                    startForegroundService(intent)
                } else {
                    startService(intent)
                }
            }

            private fun stopVpnService() {
                val intent = Intent(this, ShadowsocksVpnService::class.java).apply {
                    action = "STOP"
                }
                startService(intent)
            }
        }
        EOF

    - name: Inject Settings Integration Controller Layer
      run: |
        cat << 'EOF' > app/src/main/java/com/ashraf/whatsappvpn/ui/SettingsActivity.kt
        package com.ashraf.whatsappvpn.ui

        import android.Manifest
        import android.content.Intent
        import android.content.pm.PackageManager
        import android.os.Build
        import android.os.Bundle
        import android.provider.MediaStore
        import android.widget.Button
        import android.widget.EditText
        import android.widget.TextView
        import android.widget.Toast
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.app.ActivityCompat
        import androidx.core.content.ContextCompat
        import com.ashraf.whatsappvpn.R

        class SettingsActivity : AppCompatActivity() {

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_settings)

                val btnBack = findViewById<TextView>(R.id.btnBack)
                val etVpnLink = findViewById<EditText>(R.id.etVpnLink)
                val btnSaveLink = findViewById<Button>(R.id.btnSaveLink)
                val btnOpenScanner = findViewById<Button>(R.id.btnOpenScanner)
                val btnOpenGallery = findViewById<Button>(R.id.btnOpenGallery)

                btnBack.setOnClickListener {
                    finish() // वापस मेन स्क्रीन पर जाने के लिए
                }

                btnSaveLink.setOnClickListener {
                    val link = etVpnLink.text.toString().trim()
                    if (link.startsWith("ss://")) {
                        Toast.makeText(this, "Shadowsocks Config Saved!", Toast.LENGTH_SHORT).show()
                    } else {
                        Toast.makeText(this, "Error: Invalid Shadowsocks Link!", Toast.LENGTH_SHORT).show()
                    }
                }

                // कैमरा स्कैनर दबाने पर परमिशन मांगना
                btnOpenScanner.setOnClickListener {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, arrayOf(Manifest.permission.CAMERA), 101)
                    } else {
                        Toast.makeText(this, "Camera Permission Active. Launching Scanner Engine...", Toast.LENGTH_SHORT).show()
                    }
                }

                // गैलरी बटन दबाने पर परमिशन मांगना
                btnOpenGallery.setOnClickListener {
                    val storagePermission = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                        Manifest.permission.READ_MEDIA_IMAGES
                    } else {
                        Manifest.permission.READ_EXTERNAL_STORAGE
                    }

                    if (ContextCompat.checkSelfPermission(this, storagePermission) != PackageManager.PERMISSION_GRANTED) {
                        ActivityCompat.requestPermissions(this, arrayOf(storagePermission), 102)
                    } else {
                        val intent = Intent(Intent.ACTION_PICK, MediaStore.Images.Media.EXTERNAL_CONTENT_URI)
                        startActivityForResult(intent, 103)
                    }
                }
            }

            override fun onRequestPermissionsResult(requestCode: Int, permissions: Array<out String>, grantResults: IntArray) {
                super.onRequestPermissionsResult(requestCode, permissions, grantResults)
                if (grantResults.isNotEmpty() && grantResults[0] == PackageManager.PERMISSION_GRANTED) {
                    if (requestCode == 101) {
                        Toast.makeText(this, "Camera Permission Granted!", Toast.LENGTH_SHORT).show()
                    } else if (requestCode == 102) {
                        Toast.makeText(this, "Gallery Permission Granted!", Toast.LENGTH_SHORT).show()
                        val intent = Intent(Intent.ACTION_PICK, MediaStore.Images.Media.EXTERNAL_CONTENT_URI)
                        startActivityForResult(intent, 103)
                    }
                } else {
                    Toast.makeText(this, "Permission Denied by User!", Toast.LENGTH_SHORT).show()
                }
            }

            override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                super.onActivityResult(requestCode, resultCode, data)
                if (resultCode == RESULT_OK && requestCode == 103) {
                    Toast.makeText(this, "Screenshot Selected! Processing QR Barcode Content...", Toast.LENGTH_LONG).show()
                }
            }
        }
        EOF

    - name: Build Android App Compilation Engine
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Rename APK Output
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/WhatsApp-VPN.apk

    - name: Upload Built APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WhatsApp-VPN-Application
        path: app/build/outputs/apk/debug/WhatsApp-VPN.apk
