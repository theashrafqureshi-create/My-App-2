Name: Build WhatsApp VPN Debug APK
# 🛑 ऑटोमैटिक पुश बिल्ड को अभी के लिए रोक दिया गया है
on:
#  push:
#    branches: [ "main" ]
  workflow_dispatch: # इसका मतलब अब बिल्ड सिर्फ तब बनेगा जब आप गिटहब पर जाकर खुद "Run workflow" बटन दबाएंगे

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Repositories
      run: |
        if [ -f build.gradle ]; then
          sed -i 's/google()/google()\n        mavenCentral()/g' build.gradle
        fi
        if [ -f app/build.gradle ]; then
          sed -i 's/minifyEnabled true/minifyEnabled false/g' app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' app/build.gradle
          # पक्का करें कि mmkv और बाकी डिपेंडेंसीज़ सही से एडिटर में एड हों
          sed -i '/dependencies {/a \    implementation files("libs/mmkv.aar")' app/build.gradle
        fi

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
