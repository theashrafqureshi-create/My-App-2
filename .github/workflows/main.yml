# GitHub Actions Workflow to build fully functional WhatsApp VPN Pro with embedded core binaries
name: Build Original Full Integrated Engine
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download and Embed Pre-compiled V2Ray Core Binaries Directly
      run: |
        # 1. libs फोल्डर बनाना और mmkv.aar को सेट करना
        mkdir -p app/libs
        if [ -f app/mmkv.aar ]; then
          mv app/mmkv.aar app/libs/
        fi
        
        # 2. गिटहब के ब्लॉक से बचने के लिए सीधे इंजन की वर्किंग फाइल को लोकल डाउनलोड करके स्टोर करना
        curl -L -o app/libs/v2ray-core.aar "https://github.com/2dust/v2rayNG/releases/download/1.8.5/v2rayNG-1.8.5.aar" || echo "Local fallback initiated"
        
        # 3. ग्रैडल सेटिंग्स को सुरक्षित मोड पर ओवरराइट करना
        echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > settings.gradle
        echo "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }" >> settings.gradle
        echo "rootProject.name = \"My-App-2\"" >> settings.gradle
        echo "include ':app'" >> settings.gradle

    - name: Write Compliant App Gradle Structure
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }

        android {
            namespace 'com.v2ray.ang'
            compileSdk 34

            defaultConfig {
                applicationId "com.v2ray.ang"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                    shrinkResources false
                }
                debug {
                    minifyEnabled false
                    shrinkResources false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }

        dependencies {
            implementation files("libs/mmkv.aar")
            // ऑनलाइन डाउनलोड के बजाय सीधे अंदर बैठाई गई बाइनरी का इस्तेमाल
            if (findProject(':app')?.file('libs/v2ray-core.aar')?.exists()) {
                implementation files("libs/v2ray-core.aar")
            } else {
                implementation "com.github.2dust:v2rayNG:1.8.5"
            }
            implementation "com.journeyapps:zxing-android-embedded:4.3.0"
            implementation "com.google.zxing:core:3.4.1"
            implementation "androidx.core:core-ktx:1.12.0"
            implementation "androidx.appcompat:appcompat:1.6.1"
            implementation "com.google.android.material:material:1.11.0"
            implementation "androidx.constraintlayout:constraintlayout:2.1.4"
        }
        EOF

    - name: Configure Manifest with Complete Permissions & Foreground Engine
      run: |
        rm -f app/src/main/AndroidManifest.xml
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/tools">
            
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" tools:node="replace" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <uses-permission android:name="android.permission.BIND_VPN_SERVICE" tools:ignore="ProtectedPermissions" />
            
            <application
                android:name="com.v2ray.ang.AppConfig"
                android:allowBackup="true"
                android:label="WhatsApp VPN Pro"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                
                <property android:name="android.app.PROPERTY_SPECIAL_USE_FGS_SUBTYPE" android:value="VPN Tunnel" />
                
                <activity
                    android:name="com.v2ray.ang.ui.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                
                <activity
                    android:name="com.journeyapps.barcodescanner.CaptureActivity"
                    tools:node="replace"
                    android:screenOrientation="fullSensor"
                    android:stateNotNeeded="true"
                    android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                    android:windowSoftInputMode="stateAlwaysHidden"/>
                    
                <activity
                    android:name="com.v2ray.ang.ui.SettingsActivity"
                    android:exported="false" />
                
                <service
                    android:name="com.v2ray.ang.service.RealVpnCore"
                    android:permission="android.permission.BIND_VPN_SERVICE"
                    android:exported="false"
                    android:foregroundServiceType="specialUse">
                    <intent-filter>
                        <action android:name="android.net.VpnService" />
                    </intent-filter>
                </service>
            </application>
        </manifest>
        EOF

    - name: Inject Layout Resources
      run: |
        mkdir -p app/src/main/res/layout
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
