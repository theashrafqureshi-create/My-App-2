name: Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        clean: true # यह कमांड गिटहब के कंप्यूटर को पूरी तरह साफ़ कर देगा

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Connect to Local MMKV
      run: |
        if [ -f app/build.gradle ]; then
          sed -i 's/implementation.*com.github.tencent:mmkv.*/implementation files("mmkv.aar")/g' app/build.gradle
          sed -i 's/implementation.*com.tencent:mmkv.*/implementation files("mmkv.aar")/g' app/build.gradle
        fi

    - name: Clean and Build with Gradle
      # --no-build-cache लगाने से ग्रैडल पुराना खराब पुराना डेटा भूलकर एकदम नया ताज़ा एपीके बनाएगा
      run: ./gradlew clean assembleDebug --no-build-cache || gradle clean assembleDebug --no-build-cache

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
