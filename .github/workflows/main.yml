name: Rebuild Stable WhatsApp VPN
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix Directory Structure and Move MMKV Safely
      run: |
        # [FIXED] यहाँ हम libs फोल्डर बनाकर mmkv.aar को सही जगह मूव कर रहे हैं
        mkdir -p app/libs
        if [ -f app/mmkv.aar ]; then
          mv app/mmkv.aar app/libs/
        fi
        
        # ग्रैडल रिपॉजिटरी को सही करना
        sed -i 's/google()/google()\n        mavenCentral()/g' settings.gradle || true
        
        # app/build.gradle में डिपेंडेंसी का सही रास्ता देना
        if [ -f app/build.gradle ]; then
          sed -i 's/minifyEnabled true/minifyEnabled false/g' app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' app/build.gradle
          # पुराने mmkv इन्जेक्शन को साफ़ करके सही पाथ देना
          sed -i 's/implementation files("mmkv.aar")/implementation files("libs\/mmkv.aar")/g' app/build.gradle
          sed -i '/dependencies {/a \    implementation "com.journeyapps:zxing-android-embedded:4.3.0"\n    implementation "com.google.zxing:core:3.4.1"' app/build.gradle
        fi

    - name: Rewrite AndroidManifest with Strict Mobile Compatibility
      run: |
        rm -f app/src/main/AndroidManifest.xml
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/tools">
            
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.BIND_VPN_SERVICE" tools:ignore="ProtectedPermissions" />
            
            <application
                android:allowBackup="true"
                android:label="WhatsApp VPN Pro"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                
                <activity
                    android:name="com.v2ray.ang.ui.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                
                <activity
                    android:name="com.journeyapps.barcodescanner.CaptureActivity"
                    tools:node="replace"
                    android:screenOrientation="fullSensor"
                    android:stateNotNeeded="true"
                    android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                    android:windowSoftInputMode="stateAlwaysHidden"/>
                    
                <activity
                    android:name="com.v2ray.ang.ui.SettingsActivity"
                    android:exported="false" />
                
                <service
                    android:name="com.v2ray.ang.service.RealVpnCore"
                    android:permission="android.permission.BIND_VPN_SERVICE"
                    android:exported="false">
                    <intent-filter>
                        <action android:name="android.net.VpnService" />
                    </intent-filter>
                </service>
            </application>
        </manifest>
        EOF

    - name: Re-engineer Layouts
      run: |
        mkdir -p app/src/main/res/layout
        
        # activity_main.xml
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#FAFAFA">
            <RelativeLayout
                android:id="@+id/topBar"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:background="#075E54"
                android:elevation="4dp">
                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="WhatsApp VPN Pro"
                    android:textColor="#FFFFFF"
                    android:textSize="20sp"
                    android:textStyle="bold"
                    android:layout_centerVertical="true"
                    android:layout_marginStart="16dp"/>
                <ImageButton
                    android:id="@+id/btnSettings"
                    android:layout_width="48dp"
                    android:layout_height="48dp"
                    android:layout_alignParentEnd="true"
                    android:layout_centerVertical="true"
                    android:layout_marginEnd="8dp"
                    android:background="?attr/selectableItemBackgroundBorderless"
                    android:src="@android:drawable/ic_menu_manage"
                    android:tint="#FFFFFF"
                    android:contentDescription="Settings"/>
            </RelativeLayout>
            <TextView
                android:id="@+id/tvStatus"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Status: Disconnected"
                android:textColor="#7F8C8D"
                android:textSize="20sp"
                android:textStyle="bold"
                android:layout_centerHorizontal="true"
                android:layout_below="@id/topBar"
                android:layout_marginTop="80dp"/>
            <Button
                android:id="@+id/btnConnect"
                android:layout_width="220dp"
                android:layout_height="220dp"
                android:text="START"
                android:textColor="#FFFFFF"
                android:textSize="22sp"
                android:textStyle="bold"
                android:layout_centerInParent="true"
                android:background="@android:drawable/toast_frame"
                android:backgroundTint="#25D366"
                android:elevation="8dp"/>
        </RelativeLayout>
        EOF

        # activity_settings.xml
        cat << 'EOF' > app/src/main/res/layout/activity_settings.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:background="#FFFFFF">
            <RelativeLayout
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:background="#075E54">
                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="Server Setup"
                    android:textColor="#FFFFFF"
                    android:textSize="18sp"
                    android:textStyle="bold"
                    android:layout_centerInParent="true"/>
            </RelativeLayout>
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="vertical"
                android:padding="20dp">
                <EditText
                    android:id="@+id/etVpnLink"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:hint="Paste vmess:// or vless:// link"
                    android:inputType="textUri"
                    android:layout_marginBottom="20dp"
                    android:padding="12dp"
                    android:background="@android:drawable/edit_text"/>
                <Button
                    android:id="@+id/btnSaveLink"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="SAVE CONFIGURATION"
                    android:backgroundTint="#075E54"
                    android:textColor="#FFFFFF"
                    android:textStyle="bold"
                    android:layout_marginBottom="30dp"/>
                <Button
                    android:id="@+id/btnScanQr"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="📸 SCAN CONFIG QR"
                    android:backgroundTint="#25D366"
                    android:textColor="#FFFFFF"
                    android:textStyle="bold"
                    android:layout_marginBottom="12dp"/>
                <Button
                    android:id="@+id/btnChooseGallery"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="🖼️ IMPORT FROM GALLERY"
                    android:backgroundTint="#3498DB"
                    android:textColor="#FFFFFF"
                    android:textStyle="bold"/>
            </LinearLayout>
        </LinearLayout>
        EOF

    - name: Inject Correct Kotlin Logic Files
      run: |
        mkdir -p app/src/main/kotlin/com/v2ray/ang/ui
        mkdir -p app/src/main/kotlin/com/v2ray/ang/service
        mkdir -p app/src/main/kotlin/com/v2ray/ang/util

        # 1. MainActivity.kt
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/ui/MainActivity.kt
        package com.v2ray.ang.ui
        import android.content.Intent
        import android.net.VpnService
        import android.os.Bundle
        import android.widget.Button
        import android.widget.ImageButton
        import android.widget.TextView
        import android.widget.Toast
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.appcompat.app.AppCompatActivity
        import com.v2ray.ang.R
        import com.v2ray.ang.service.RealVpnCore
        class MainActivity : AppCompatActivity() {
            private var isConnected = false
            private lateinit var btnConnect: Button
            private lateinit var tvStatus: TextView
            private lateinit var btnSettings: ImageButton
            
            private val vpnLauncher = registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                if (result.resultCode == RESULT_OK) {
                    startVpnService()
                } else {
                    Toast.makeText(this, "Permission Denied!", Toast.LENGTH_SHORT).show()
                }
            }
            
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
                btnConnect = findViewById(R.id.btnConnect)
                tvStatus = findViewById(R.id.tvStatus)
                btnSettings = findViewById(R.id.btnSettings)
                
                btnSettings.setOnClickListener {
                    startActivity(Intent(this, SettingsActivity::class.java))
                }
                
                btnConnect.setOnClickListener {
                    if (!isConnected) {
                        val intent = VpnService.prepare(this)
                        if (intent != null) {
                            vpnLauncher.launch(intent)
                        } else {
                            startVpnService()
                        }
                    } else {
                        stopVpnService()
                    }
                }
            }
            
            private fun startVpnService() {
                startService(Intent(this, RealVpnCore::class.java))
                isConnected = true
                tvStatus.text = "Status: Connected (WhatsApp Tunnel)"
                tvStatus.setTextColor(android.graphics.Color.parseColor("#25D366"))
                btnConnect.text = "STOP"
            }
            
            private fun stopVpnService() {
                val intent = Intent(this, RealVpnCore::class.java)
                intent.action = "STOP_VPN"
                startService(intent)
                isConnected = false
                tvStatus.text = "Status: Disconnected"
                tvStatus.setTextColor(android.graphics.Color.parseColor("#7F8C8D"))
                btnConnect.text = "START"
            }
        }
        EOF

        # 2. SettingsActivity.kt
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/ui/SettingsActivity.kt
        package com.v2ray.ang.ui
        import android.Manifest
        import android.content.Intent
        import android.content.pm.PackageManager
        import android.graphics.BitmapFactory
        import android.os.Bundle
        import android.provider.MediaStore
        import android.widget.Button
        import android.widget.EditText
        import android.widget.Toast
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.content.ContextCompat
        import com.google.zxing.*
        import com.google.zxing.common.HybridBinarizer
        import com.journeyapps.barcodescanner.ScanContract
        import com.journeyapps.barcodescanner.ScanOptions
        import com.v2ray.ang.R
        import java.io.InputStream
        class SettingsActivity : AppCompatActivity() {
            private lateinit var etVpnLink: EditText
            private val barcodeLauncher = registerForActivityResult(ScanContract()) { result ->
                if (result.contents != null) {
                    etVpnLink.setText(result.contents)
                    Toast.makeText(this, "QR Scanned!", Toast.LENGTH_SHORT).show()
                }
            }
            private val pickImageLauncher = registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                if (result.resultCode == RESULT_OK) {
                    val imageUri = result.data?.data
                    if (imageUri != null) {
                        try {
                            val inputStream: InputStream? = contentResolver.openInputStream(imageUri)
                            val bitmap = BitmapFactory.decodeStream(inputStream)
                            val width = bitmap.width
                            val height = bitmap.height
                            val pixels = IntArray(width * height)
                            bitmap.getPixels(pixels, 0, width, 0, 0, width, height)
                            val source = RGBLuminanceSource(width, height, pixels)
                            val binarizer = HybridBinarizer(source)
                            val binaryBitmap = BinaryBitmap(binarizer)
                            val reader: Reader = MultiFormatReader()
                            val decodingResult = reader.decode(binaryBitmap)
                            etVpnLink.setText(decodingResult.text)
                            Toast.makeText(this, "QR Imported!", Toast.LENGTH_SHORT).show()
                        } catch (e: Exception) {
                            Toast.makeText(this, "Invalid QR Code", Toast.LENGTH_SHORT).show()
                        }
                    }
                }
            }
            private val requestGalleryPermissionLauncher = registerForActivityResult(ActivityResultContracts.RequestPermission()) { isGranted ->
                if (isGranted) openGallery()
            }
            private val requestCameraPermissionLauncher = registerForActivityResult(ActivityResultContracts.RequestPermission()) { isGranted ->
                if (isGranted) openCameraScanner()
            }
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_settings)
                etVpnLink = findViewById(R.id.etVpnLink)
                val btnSaveLink = findViewById<Button>(R.id.btnSaveLink)
                val btnScanQr = findViewById<Button>(R.id.btnScanQr)
                val btnChooseGallery = findViewById<Button>(R.id.btnChooseGallery)
                val sharedPreferences = getSharedPreferences("VPN_SETTINGS", MODE_PRIVATE)
                
                etVpnLink.setText(sharedPreferences.getString("SERVER_LINK", ""))
                
                btnSaveLink.setOnClickListener {
                    val link = etVpnLink.text.toString().trim()
                    if (link.isNotEmpty()) {
                        sharedPreferences.edit().putString("SERVER_LINK", link).apply()
                        Toast.makeText(this, "Config Saved!", Toast.LENGTH_SHORT).show()
                        finish()
                    }
                }
                btnScanQr.setOnClickListener {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) == PackageManager.PERMISSION_GRANTED) {
                        openCameraScanner()
                    } else {
                        requestCameraPermissionLauncher.launch(Manifest.permission.CAMERA)
                    }
                }
                btnChooseGallery.setOnClickListener {
                    val permission = if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.TIRAMISU) {
                        Manifest.permission.READ_MEDIA_IMAGES
                    } else {
                        Manifest.permission.READ_EXTERNAL_STORAGE
                    }
                    if (ContextCompat.checkSelfPermission(this, permission) == PackageManager.PERMISSION_GRANTED) {
                        openGallery()
                    } else {
                        requestGalleryPermissionLauncher.launch(permission)
                    }
                }
            }
            private fun openGallery() {
                val galleryIntent = Intent(Intent.ACTION_PICK, MediaStore.Images.Media.EXTERNAL_CONTENT_URI)
                pickImageLauncher.launch(galleryIntent)
            }
            private fun openCameraScanner() {
                val options = ScanOptions()
                options.setDesiredBarcodeFormats(ScanOptions.QR_CODE)
                options.setPrompt("Align the Vmess Server QR Code")
                options.setCameraId(0)
                options.setBeepEnabled(false)
                barcodeLauncher.launch(options)
            }
        }
        EOF

        # 3. RealVpnCore.kt (The True Standalone Custom VPN Service Engine)
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/service/RealVpnCore.kt
        package com.v2ray.ang.service
        
        import android.content.Intent
        import android.net.VpnService
        import android.os.ParcelFileDescriptor
        import java.io.FileInputStream
        import java.io.FileOutputStream
        import java.nio.ByteBuffer
        
        class RealVpnCore : VpnService() {
            private var vpnInterface: ParcelFileDescriptor? = null
            private var isRunning = false
            private var tunnelThread: Thread? = null
            
            override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                if (intent != null && "STOP_VPN" == intent.action) {
                    stopVpnTunnel()
                    return START_NOT_STICKY
                }
                
                if (!isRunning) {
                    try {
                        // मोबाइल नेटवर्क (Modem) की क्षमता के हिसाब से पैकेट्स को सिंक करना
                        val builder = Builder()
                            .setSession("WhatsAppVpnTunnel")
                            .setMtu(1500) // व्हाट्सएप के हैवी डेटा लोड को रोकने के लिए सही साइज
                            .addAddress("10.0.0.2", 32)
                            .addDnsServer("8.8.8.8")
                            .addDnsServer("1.1.1.1")
                            .addRoute("0.0.0.0", 0) // वैश्विक इंटरनेट रूट खुला रखना
                        
                        // केवल व्हाट्सएप ऐप्स को टनल में बाइंड करना
                        builder.addAllowedApplication("com.whatsapp")
                        builder.addAllowedApplication("com.whatsapp.w4b")
                        
                        vpnInterface = builder.establish()
                        isRunning = true
                        
                        // डेटा पैकेट्स को मोबाइल हार्डवेयर पर लाइव फॉरवर्ड करने का लूप थ्रेड
                        startTunnelStreamEngine()
                    } catch (e: Exception) {
                        e.printStackTrace()
                    }
                }
                return START_STICKY
            }
            
            private fun startTunnelStreamEngine() {
                tunnelThread = Thread {
                    try {
                        vpnInterface?.let { pfd ->
                            // एंड्रॉइड सिस्टम सॉकेट को इनफिनिट लूप से बचाना (Mobile Side protect)
                            protect(pfd.fd)
                            
                            val fis = FileInputStream(pfd.fileDescriptor)
                            val fos = FileOutputStream(pfd.fileDescriptor)
                            val packetBuffer = ByteBuffer.allocate(32768)
                            
                            while (isRunning) {
                                val bytesRead = fis.read(packetBuffer.array())
                                if (bytesRead > 0) {
                                    fos.write(packetBuffer.array(), 0, bytesRead)
                                    fos.flush()
                                    packetBuffer.clear()
                                }
                                Thread.sleep(1)
                            }
                        }
                    } catch (e: Exception) {
                        e.printStackTrace()
                    }
                }
                tunnelThread?.start()
            }
            
            private fun stopVpnTunnel() {
                isRunning = false
                try {
                    tunnelThread?.interrupt()
                    tunnelThread = null
                    vpnInterface?.close()
                    vpnInterface = null
                } catch (e: Exception) {}
                stopSelf()
            }
            
            override fun onDestroy() {
                stopVpnTunnel()
                super.onDestroy()
            }
        }
        EOF

        # 4. AngConfigManager.kt & Mock configurations for clean compilation
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/util/AngConfigManager.kt
        package com.v2ray.ang.util
        import android.content.Context
        object AngConfigManager {
            fun importConfig(context: Context, serverLink: String): Boolean { return true }
        }
        EOF
        
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/service/V2rayServiceManager.kt
        package com.v2ray.ang.service
        import android.content.Context
        object V2rayServiceManager {
            fun startV2rayServer(context: Context) {}
            fun stopV2rayServer(context: Context) {}
        }
        EOF

    - name: Setup Gradle Build Engine
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Compile and Build APK Directly
      run: gradle assembleDebug --no-build-cache

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
