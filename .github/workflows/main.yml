name: Build WhatsApp VPN Debug APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. गिटहब सर्वर पर कोड चेकआउट करना
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. जावा 17 सेट करना
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. ग्रैडल रैपर को चलने की परमिशन देना
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 4. 🎯 [FIXED] गिटहब सर्वर को जबरदस्ती ग्रैडल 8.4 पर लॉक करना ताकि AAPT एरर जड़ से खत्म हो जाए
      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      # 5. टेस्टिंग के लिए डिबग एपीके तैयार करना
      - name: Build Production Debug APK
        run: ./gradlew assembleDebug --no-daemon

      # 6. बनी हुई एपीके को ढूंढकर नाम देना
      - name: Prepare Dynamic Debug Artifact
        run: |
          mkdir -p debug_output
          cp app/build/outputs/apk/debug/app-debug.apk debug_output/WhatsApp_VPN_Debug.apk || echo "APK path format varied"

      # 7. गिटहब के Artifacts सेक्शन में डाउनलोड के लिए लाइव करना
      - name: Upload WhatsApp VPN Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsApp_VPN_Debug
          path: debug_output/WhatsApp_VPN_Debug.apk
          if-no-files-found: error
          retention-days: 7
