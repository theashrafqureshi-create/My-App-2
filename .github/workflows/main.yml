name: Build WhatsApp VPN Debug APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Repositories
      run: |
        if [ -f build.gradle ]; then
          sed -i 's/google()/google()\n        mavenCentral()/g' build.gradle
        fi
        if [ -f app/build.gradle ]; then
          sed -i 's/minifyEnabled true/minifyEnabled false/g' app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' app/build.gradle
          sed -i '/dependencies {/a \    implementation files("libs/mmkv.aar")' app/build.gradle
        fi

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
