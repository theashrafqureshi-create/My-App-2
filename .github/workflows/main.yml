name: Rebuild WhatsApp VPN - Core Fix
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix Directory Structure and Local MMKV Link
      run: |
        # 1. libs फोल्डर बनाना और mmkv.aar को सही जगह सेट करना
        mkdir -p app/libs
        if [ -f app/mmkv.aar ]; then
          mv app/mmkv.aar app/libs/
        fi
        
        # 2. ग्रैडल रिपॉजिटरी को अपडेट करना
        sed -i 's/google()/google()\n        mavenCentral()/g' settings.gradle || true
        
        # 3. build.gradle के अंदर से ऑनलाइन mmkv डिपेंडेंसी को हटाकर लोकल पाथ सेट करना
        if [ -f app/build.gradle ]; then
          sed -i 's/minifyEnabled true/minifyEnabled false/g' app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' app/build.gradle
          
          # ऑनलाइन डिपेंडेंसी की लाइनों को साफ़ करना ताकि एरर न आए
          sed -i '/com.github.tencent:mmkv/d' app/build.gradle
          sed -i '/com.tencent:mmkv/d' app/build.gradle
          
          # हमारी लोकल mmkv.aar फ़ाइल को ग्रैडल इंजन के साथ जोड़ना
          sed -i '/dependencies {/a \    implementation files("libs/mmkv.aar")\n    implementation "com.journeyapps:zxing-android-embedded:4.3.0"\n    implementation "com.google.zxing:core:3.4.1"' app/build.gradle
        fi

    - name: Fix Manifest for Foreground Service
      run: |
        rm -f app/src/main/AndroidManifest.xml
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/tools">
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <uses-permission android:name="android.permission.BIND_VPN_SERVICE" tools:ignore="ProtectedPermissions" />
            
            <application android:allowBackup="true" android:label="WhatsApp VPN" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name="com.v2ray.ang.ui.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <activity android:name="com.v2ray.ang.ui.SettingsActivity" android:exported="false" />
                <service android:name=".service.RealVpnCore" android:permission="android.permission.BIND_VPN_SERVICE" android:exported="false" android:foregroundServiceType="location">
                    <intent-filter>
                        <action android:name="android.net.VpnService" />
                    </intent-filter>
                </service>
            </application>
        </manifest>
        EOF

    - name: Inject Corrected Kotlin Code (Gallery + Foreground Fix)
      run: |
        mkdir -p app/src/main/kotlin/com/v2ray/ang/ui app/src/main/kotlin/com/v2ray/ang/service
        
        # SettingsActivity.kt (Android 13+ Permission Fix)
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/ui/SettingsActivity.kt
        package com.v2ray.ang.ui
        import android.Manifest
        import android.content.Intent
        import android.content.pm.PackageManager
        import android.os.Build
        import android.os.Bundle
        import android.widget.Button
        import android.widget.EditText
        import android.widget.Toast
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.content.ContextCompat
        import com.v2ray.ang.R
        
        class SettingsActivity : AppCompatActivity() {
            private lateinit var etVpnLink: EditText
            private val pickImageLauncher = registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                if (result.resultCode == RESULT_OK) { Toast.makeText(this, "Selected!", Toast.LENGTH_SHORT).show() }
            }
            private val permissionLauncher = registerForActivityResult(ActivityResultContracts.RequestPermission()) { isGranted ->
                if (isGranted) openGallery() else Toast.makeText(this, "Permission Denied", Toast.LENGTH_SHORT).show()
            }
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_settings)
                etVpnLink = findViewById(R.id.etVpnLink)
                findViewById<Button>(R.id.btnChooseGallery).setOnClickListener {
                    val permission = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) Manifest.permission.READ_MEDIA_IMAGES else Manifest.permission.READ_EXTERNAL_STORAGE
                    if (ContextCompat.checkSelfPermission(this, permission) == PackageManager.PERMISSION_GRANTED) openGallery()
                    else permissionLauncher.launch(permission)
                }
            }
            private fun openGallery() {
                val intent = Intent(Intent.ACTION_PICK, android.provider.MediaStore.Images.Media.EXTERNAL_CONTENT_URI)
                pickImageLauncher.launch(intent)
            }
        }
        EOF

        # RealVpnCore.kt (Foreground Service Fix)
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/service/RealVpnCore.kt
        package com.v2ray.ang.service
        import android.net.VpnService
        import android.content.Intent
        import android.app.NotificationChannel
        import android.app.NotificationManager
        import android.app.Notification
        import android.os.Build
        import android.os.ParcelFileDescriptor
        import androidx.core.app.NotificationCompat

        class RealVpnCore : VpnService() {
            private var vpnInterface: ParcelFileDescriptor? = null
            
            override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                    val channel = NotificationChannel("vpn_service", "VPN Service", NotificationManager.IMPORTANCE_LOW)
                    getSystemService(NotificationManager::class.java).createNotificationChannel(channel)
                    val notification = NotificationCompat.Builder(this, "vpn_service")
                        .setContentTitle("WhatsApp VPN Active").setSmallIcon(android.R.drawable.stat_sys_vpn_config).build()
                    startForeground(1, notification)
                }
                val builder = Builder().setSession("WhatsAppTunnel").setMtu(1500).addAddress("10.0.0.2", 32).addDnsServer("8.8.8.8").addRoute("0.0.0.0", 0)
                builder.addAllowedApplication("com.whatsapp")
                vpnInterface = builder.establish()
                return START_STICKY
            }
            override fun onDestroy() { vpnInterface?.close(); super.onDestroy() }
        }
        EOF

    - name: Build APK
      run: gradle assembleDebug --no-build-cache

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
