name: Build WhatsApp VPN Debug APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 🎯 [MAGIC STEP] यह स्टेप आपके ऐप लेवल और रूट लेवल के वर्जन्स को खुद-ब-खुद 8.2.2 पर अलाइन कर देगा!
    - name: Setup Gradle Repositories and Fix Version Mismatch
      run: |
        if [ -f settings.gradle ]; then
          sed -i 's/google()/google()\n        mavenCentral()/g' settings.gradle
        fi
        if [ -f build.gradle ]; then
          sed -i 's/google()/google()\n        mavenCentral()/g' build.gradle
        fi
        if [ -f app/build.gradle ]; then
          # पुराना वर्जन एरर हटाने के लिए app/build.gradle से वर्जन टैग्स को जबरदस्ती हटा रहे हैं
          sed -i "s/version '8.4.0'//g" app/build.gradle
          sed -i "s/version '1.9.22'//g" app/build.gradle
          sed -i 's/minifyEnabled true/minifyEnabled false/g' app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' app/build.gradle
          sed -i 's/implementation.*com.github.tencent:mmkv.*/implementation files("mmkv.aar")/g' app/build.gradle
          sed -i 's/implementation.*com.tencent:mmkv.*/implementation files("mmkv.aar")/g' app/build.gradle
          sed -i '/dependencies {/a \    implementation "com.journeyapps:zxing-android-embedded:4.3.0"\n    implementation "com.google.zxing:core:3.4.1"' app/build.gradle
        fi

    - name: Configure Manifest Safely for Shadowsocks
      run: |
        rm -f app/src/main/AndroidManifest.xml
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.google.com/tools">
            
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_VPN" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.BIND_VPN_SERVICE" tools:ignore="ProtectedPermissions" />
            
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="WhatsApp VPN"
                android:roundIcon="@mipmap/ic_launcher"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                
                <activity
                    android:name="com.ashraf.whatsappvpn.ui.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                
                <activity
                    android:name="com.journeyapps.barcodescanner.CaptureActivity"
                    tools:node="replace"
                    android:screenOrientation="fullSensor"
                    android:stateNotNeeded="true"
                    android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                    android:windowSoftInputMode="stateAlwaysHidden"/>
                    
                <activity
                    android:name="com.ashraf.whatsappvpn.ui.SettingsActivity"
                    android:exported="false" />
                
                <service
                    android:name="com.ashraf.whatsappvpn.service.ShadowsocksVpnService"
                    android:permission="android.permission.BIND_VPN_SERVICE"
                    android:exported="false">
                    <intent-filter>
                        <action android:name="android.net.VpnService" />
                    </intent-filter>
                </service>
            </application>
        </manifest>
        EOF

    - name: Design Beautiful WhatsApp Green Layouts
      run: |
        mkdir -p app/src/main/res/layout
        
        # 1. मुख्य स्क्रीन (activity_main.xml)
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#FFFFFF">
            <RelativeLayout
                android:id="@+id/topBar"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:background="#075E54"
                android:elevation="4dp">
                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="WhatsApp VPN"
                    android:textColor="#FFFFFF"
                    android:textSize="20sp"
                    android:textStyle="bold"
                    android:layout_centerVertical="true"
                    android:layout_marginStart="16dp"/>
                <ImageButton
                    android:id="@+id/btnSettings"
                    android:layout_width="48dp"
                    android:layout_height="48dp"
                    android:layout_alignParentEnd="true"
                    android:layout_centerVertical="true"
                    android:layout_marginEnd="8dp"
                    android:background="?attr/selectableItemBackgroundBorderless"
                    android:src="@android:drawable/ic_menu_manage"
                    android:tint="#FFFFFF"
                    android:contentDescription="Settings"/>
            </RelativeLayout>
            <TextView
                android:id="@+id/tvStatus"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Disconnected"
                android:textColor="#7F8C8D"
                android:textSize="22sp"
                android:textStyle="bold"
                android:layout_centerHorizontal="true"
                android:layout_below="@id/topBar"
                android:layout_marginTop="100dp"/>
            <Button
                android:id="@+id/btnConnect"
                android:layout_width="220dp"
                android:layout_height="220dp"
                android:text="CONNECT"
                android:textColor="#FFFFFF"
                android:textSize="20sp"
                android:textStyle="bold"
                android:layout_centerInParent="true"
                android:background="@android:drawable/toast_frame"
                android:backgroundTint="#25D366"
                android:elevation="10dp"/>
        </RelativeLayout>
        EOF

        # 2. सेटिंग्स स्क्रीन (activity_settings.xml)
        cat << 'EOF' > app/src/main/res/layout/activity_settings.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:background="#FFFFFF">
            <RelativeLayout
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:background="#075E54"
                android:layout_marginBottom="20dp">
                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="Server Configuration"
                    android:textColor="#FFFFFF"
                    android:textSize="18sp"
                    android:textStyle="bold"
                    android:layout_centerInParent="true"/>
            </RelativeLayout>
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="vertical"
                android:padding="20dp">
                <EditText
                    android:id="@+id/etVpnLink"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:hint="Paste your ss:// link"
                    android:inputType="textUri"
                    android:layout_marginBottom="16dp"
                    android:padding="14dp"
                    android:background="@android:drawable/edit_text"/>
                <Button
                    android:id="@+id/btnSaveLink"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="SAVE CONFIG"
                    android:backgroundTint="#075E54"
                    android:textColor="#FFFFFF"
                    android:textStyle="bold"
                    android:layout_marginBottom="40dp"/>
                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="━ OR ━"
                    android:textColor="#95A5A6"
                    android:layout_gravity="center"
                    android:layout_marginBottom="20dp"/>
                <Button
                    android:id="@+id/btnScanQr"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="📸 SCAN SERVER QR"
                    android:backgroundTint="#25D366"
                    android:textColor="#FFFFFF"
                    android:textStyle="bold"
                    android:layout_marginBottom="12dp"/>
                <Button
                    android:id="@+id/btnChooseGallery"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="🖼️ IMPORT FROM GALLERY"
                    android:backgroundTint="#3498DB"
                    android:textColor="#FFFFFF"
                    android:textStyle="bold"/>
            </LinearLayout>
        </LinearLayout>
        EOF

        # 3. वेलकम बैनर (dialog_welcome.xml)
        cat << 'EOF' > app/src/main/res/layout/dialog_welcome.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:background="#FFFFFF"
            android:padding="20dp">
            <ImageButton
                android:id="@+id/btnCloseBanner"
                android:layout_width="40dp"
                android:layout_height="40dp"
                android:layout_alignParentEnd="true"
                android:layout_alignParentTop="true"
                android:background="?attr/selectableItemBackgroundBorderless"
                android:src="@android:drawable/ic_menu_close_clear_cancel"
                android:contentDescription="Close"/>
            <TextView
                android:id="@+id/dialogTitle"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="✨ Welcome to WhatsApp VPN"
                android:textSize="18sp"
                android:textStyle="bold"
                android:textColor="#075E54"
                android:layout_alignParentStart="true"
                android:layout_toStartOf="@id/btnCloseBanner"
                android:layout_marginTop="8dp"
                android:layout_marginBottom="16dp"/>
            <TextView
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:layout_below="@id/dialogTitle"
                android:text="This VPN is fully optimized only for WhatsApp Video/Audio calling and chatting.\n\nClick the ⚙️ icon at the top right to set up your Shadowsocks (ss://) server link or scan a QR code from your camera or gallery."
                android:textColor="#34495E"
                android:textSize="15sp"
                android:lineSpacingExtra="4dp"/>
        </RelativeLayout>
        EOF

    - name: Inject Strict Permissions and Real QR Decoding Engine
      run: |
        mkdir -p app/src/main/kotlin/com/ashraf/whatsappvpn/ui
        
        # MainActivity.kt
        cat << 'EOF' > app/src/main/kotlin/com/ashraf/whatsappvpn/ui/MainActivity.kt
        package com.ashraf.whatsappvpn.ui
        import android.content.Intent
        import android.net.VpnService
        import android.os.Bundle
        import android.view.LayoutInflater
        import android.widget.Button
        import android.widget.ImageButton
        import android.widget.TextView
        import android.widget.Toast
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.appcompat.app.AlertDialog
        import androidx.appcompat.app.AppCompatActivity
        import com.ashraf.whatsappvpn.R
        import com.ashraf.whatsappvpn.service.V2rayServiceManager
        class MainActivity : AppCompatActivity() {
            private var isConnected = false
            private lateinit var btnConnect: Button
            private lateinit var tvStatus: TextView
            private lateinit var btnSettings: ImageButton
            
            private val vpnLauncher = registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                if (result.resultCode == RESULT_OK) {
                    activateVpnCore()
                } else {
                    Toast.makeText(this, "VPN Permission Denied!", Toast.LENGTH_SHORT).show()
                }
            }
            
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
                btnConnect = findViewById(R.id.btnConnect)
                tvStatus = findViewById(R.id.tvStatus)
                btnSettings = findViewById(R.id.btnSettings)
                btnSettings.setOnClickListener {
                    startActivity(Intent(this, SettingsActivity::class.java))
                }
                btnConnect.setOnClickListener {
                    if (!isConnected) {
                        val sharedPreferences = getSharedPreferences("VPN_SETTINGS", MODE_PRIVATE)
                        val savedLink = sharedPreferences.getString("SERVER_LINK", "")
                        
                        if (savedLink.isNullOrEmpty()) {
                            Toast.makeText(this, "Please configure or scan an ss:// link first!", Toast.LENGTH_LONG).show()
                            startActivity(Intent(this, SettingsActivity::class.java))
                            return@setOnClickListener
                        }
                        
                        val intent = VpnService.prepare(this)
                        if (intent != null) {
                            vpnLauncher.launch(intent)
                        } else {
                            activateVpnCore()
                        }
                    } else {
                        deactivateVpnCore()
                    }
                }
                showWelcomeBanner()
            }
            
            private fun activateVpnCore() {
                try {
                    val sharedPreferences = getSharedPreferences("VPN_SETTINGS", MODE_PRIVATE)
                    val savedLink = sharedPreferences.getString("SERVER_LINK", "")
                    V2rayServiceManager.startV2rayServer(this, savedLink)
                    isConnected = true
                    tvStatus.text = "Connected (WhatsApp Only Mode)"
                    tvStatus.setTextColor(android.graphics.Color.parseColor("#25D366"))
                    btnConnect.text = "DISCONNECT"
                    Toast.makeText(this, "WhatsApp Bypass Tunnel Active 🚀", Toast.LENGTH_SHORT).show()
                } catch(e: Exception) {}
            }
            
            private fun deactivateVpnCore() {
                try {
                    V2rayServiceManager.stopV2rayServer(this)
                } catch(e: Exception) {}
                isConnected = false
                tvStatus.text = "Disconnected"
                tvStatus.setTextColor(android.graphics.Color.parseColor("#7F8C8D"))
                btnConnect.text = "CONNECT"
                Toast.makeText(this, "VPN Stopped Successfully", Toast.LENGTH_SHORT).show()
            }
            
            private fun showWelcomeBanner() {
                try {
                    val dialogView = LayoutInflater.from(this).inflate(R.layout.dialog_welcome, null)
                    val alertDialog = AlertDialog.Builder(this).setView(dialogView).create()
                    dialogView.findViewById<ImageButton>(R.id.btnCloseBanner).setOnClickListener {
                        alertDialog.dismiss()
                    }
                    alertDialog.setCancelable(true)
                    alertDialog.show()
                } catch (e: Exception) {}
            }
        }
        EOF

        # SettingsActivity.kt
        cat << 'EOF' > app/src/main/kotlin/com/ashraf/whatsappvpn/ui/SettingsActivity.kt
        package com.ashraf.whatsappvpn.ui
        import android.Manifest
        import android.content.Intent
        import android.content.pm.PackageManager
        import android.graphics.BitmapFactory
        import android.net.Uri
        import android.os.Bundle
        import android.provider.MediaStore
        import android.widget.Button
        import android.widget.EditText
        import android.widget.Toast
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.content.ContextCompat
        import com.google.zxing.*
        import com.google.zxing.common.HybridBinarizer
        import com.journeyapps.barcodescanner.ScanContract
        import com.journeyapps.barcodescanner.ScanOptions
        import com.ashraf.whatsappvpn.R
        import java.io.InputStream
        class SettingsActivity : AppCompatActivity() {
            private lateinit var etVpnLink: EditText
            private val barcodeLauncher = registerForActivityResult(ScanContract()) { result ->
                if (result.contents != null) {
                    etVpnLink.setText(result.contents)
                    Toast.makeText(this, "QR Code Scanned & Auto-Pasted!", Toast.LENGTH_LONG).show()
                } else {
                    Toast.makeText(this, "Scanning Cancelled", Toast.LENGTH_SHORT).show()
                }
            }
            private val pickImageLauncher = registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                if (result.resultCode == RESULT_OK) {
                    val imageUri = result.data?.data
                    if (imageUri != null) {
                        try {
                            val inputStream: InputStream? = contentResolver.openInputStream(imageUri)
                            val bitmap = BitmapFactory.d
