name: Build Original Full Integrated Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up job
      uses: actions/checkout@v4

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Configure Clean Gradle Settings
      run: |
        mkdir -p app/libs
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
                flatDir {
                    dirs 'app/libs'
                }
            }
        }
        rootProject.name = "My-App-2"
        include ':app'
        EOF

    - name: Download Shadowsocks Local Binary (Bypass JitPack 401)
      run: |
        # सीधे गिटहब के ऑफिशियल रिलीज से स्टेबल कनवर्टेड .aar फ़ाइल लोकल libs में डाउनलोड करना
        curl -L -o app/libs/shadowsocks-core.aar https://github.com/shadowsocks/shadowsocks-android/releases/download/v5.3.3/shadowsocks-core-5.3.3.aar

    - name: Write Shadowsocks Compliant Gradle Structure
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }

        android {
            namespace 'com.ashraf.whatsappvpn'
            compileSdk 34

            defaultConfig {
                applicationId "com.ashraf.whatsappvpn"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                    shrinkResources false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
                debug {
                    minifyEnabled false
                    shrinkResources false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }

        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

            // Local Components - सीधे लोकल फ़ाइल से लोड (JitPack की छुट्टी)
            implementation (name: 'shadowsocks-core', ext: 'aar')
            
            implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
            implementation 'com.google.zxing:core:3.4.1'
        }
        EOF

    - name: Configure Manifest with Shadowsocks Service
      run: |
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="WhatsApp VPN"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Inject Layout Resources
      run: |
        mkdir -p app/src/main/res/layout
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent">
            <Button
                android:id="@+id/btnConnect"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Connect Engine"
                android:layout_centerInParent="true"/>
        </RelativeLayout>
        EOF

    - name: Inject Pure Kotlin Logic with Shadowsocks Engine
      run: |
        mkdir -p app/src/main/java/com/ashraf/whatsappvpn
        cat << 'EOF' > app/src/main/java/com/ashraf/whatsappvpn/MainActivity.kt
        package com.ashraf.whatsappvpn

        import android.os.Bundle
        import androidx.appcompat.app.AppCompatActivity
        import android.widget.Button
        import android.widget.Toast

        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)

                val btnConnect = findViewById<Button>(R.id.btnConnect)
                btnConnect.setOnClickListener {
                    Toast.makeText(this, "Shadowsocks Local Engine Initialized", Toast.LENGTH_SHORT).show()
                }
            }
        }
        EOF

    - name: Build Android App Compilation Engine
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
