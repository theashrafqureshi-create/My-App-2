name: Build WhatsApp VPN Release APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # इससे तुम जब चाहो गिटहब पर मैन्युअल बटन दबाकर भी बिल्ड चालू कर सकते हो

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. गिटहब सर्वर पर तुम्हारा सारा कोड चेकआउट करना
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. जावा 17 सेट करना (जो तुम्हारी build.gradle की रिक्वायरमेंट है)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. ग्रैडल रैपर और स्क्रिप्ट को चलने की परमिशन देना
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 4. तुम्हारी शर्तों के मुताबिक 'Release APK' तैयार करना (बिना डिबग टैग के)
      - name: Build Production Release APK
        run: ./gradlew assembleRelease --no-daemon

      # 5. बनी हुई एपीके फाइल को ढूंढकर उसे सुंदर नाम देना
      - name: Prepare Dynamic Release Artifact
        run: |
          mkdir -p release_output
          cp app/build/outputs/apk/release/app-release-unsigned.apk release_output/WhatsApp_VPN_Release.apk || cp app/build/outputs/apk/release/app-release.apk release_output/WhatsApp_VPN_Release.apk || echo "APK path format varied"

      # 6. गिटहब के Artifacts सेक्शन में 'WhatsApp_VPN_Release.apk' को डाउनलोड के लिए लाइव करना
      - name: Upload WhatsApp VPN Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsApp_VPN_Release
          path: release_output/WhatsApp_VPN_Release.apk
          if-no-files-found: error
          retention-days: 7
