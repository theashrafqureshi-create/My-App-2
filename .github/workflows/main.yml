name: Build Original Full Integrated Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up Job
      uses: actions/checkout@v4

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Configure Clean Gradle Settings
      run: |
        mkdir -p app/libs
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "My-App-2"
        include ':app'
        EOF

    # यहाँ हमने पुराना टूटी हुई बाइनरी डाउनलोड करने वाला स्टेप पूरा हटा दिया है

    - name: Write Shadowsocks Compliant Gradle Structure
      run: |
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }

        android {
            namespace 'com.ashraf.whatsappvpn'
            compileSdk 34

            defaultConfig {
                applicationId "com.ashraf.whatsappvpn"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                    shrinkResources false
                    proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                }
                debug {
                    minifyEnabled false
                    shrinkResources false
                }
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }

        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            
            // पुराना shadowsocks-core यहाँ से हटा दिया गया है क्योंकि हमारा इंजन अब इनबिल्ट जावा में है
            
            implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
            implementation 'com.google.zxing:core:3.4.1'
        }
        EOF

    - name: Configure Manifest with Shadowsocks Service
      run: |
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="WhatsApp VPN"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity
                    android:name=".ui.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service 
                    android:name="com.ashraf.whatsappvpn.service.ShadowsocksVpnService"
                    android:permission="android.permission.BIND_VPN_SERVICE"
                    android:exported="false">
                    <intent-filter>
                        <action android:name="android.net.VpnService" />
                    </intent-filter>
                </service>
            </application>
        </manifest>
        EOF

    - name: Inject Layout Resources
      run: |
        mkdir -p app/src/main/res/layout
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent">
            <Button
                android:id="@+id/btnConnect"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Connect Engine"
                android:layout_centerInParent="true"/>
        </RelativeLayout>
        EOF

    - name: Inject Pure Kotlin Logic with Shadowsocks Engine
      run: |
        mkdir -p app/src/main/java/com/ashraf/whatsappvpn/ui
        cat << 'EOF' > app/src/main/java/com/ashraf/whatsappvpn/ui/MainActivity.kt
        package com.ashraf.whatsappvpn.ui

        import android.content.Intent
        import android.net.VpnService
        import android.os.Bundle
        import android.widget.Button
        import android.widget.Toast
        import androidx.appcompat.app.AppCompatActivity
        import com.ashraf.whatsappvpn.R
        import com.ashraf.whatsappvpn.service.ShadowsocksVpnService

        class MainActivity : AppCompatActivity() {

            private var isConnected = false

            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)

                val btnConnect = findViewById<Button>(R.id.btnConnect)

                btnConnect.setOnClickListener {
                    if (!isConnected) {
                        val intent = VpnService.prepare(this)
                        if (intent != null) {
                            startActivityForResult(intent, 0)
                        } else {
                            onActivityResult(0, RESULT_OK, null)
                        }
                    } else {
                        stopVpnService()
                        btnConnect.text = "Connect Engine"
                        Toast.makeText(this, "VPN Disconnected", Toast.LENGTH_SHORT).show()
                        isConnected = false
                    }
                }
            }

            override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
                super.onActivityResult(requestCode, resultCode, data)
                if (resultCode == RESULT_OK) {
                    startVpnService()
                    val btnConnect = findViewById<Button>(R.id.btnConnect)
                    btnConnect.text = "Disconnect"
                    Toast.makeText(this, "VPN Connected Successfully!", Toast.LENGTH_SHORT).show()
                    isConnected = true
                }
            }

            private fun startVpnService() {
                val intent = Intent(this, ShadowsocksVpnService::class.java)
                if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.O) {
                    startForegroundService(intent)
                } else {
                    startService(intent)
                }
            }

            private fun stopVpnService() {
                val intent = Intent(this, ShadowsocksVpnService::class.java)
                stopService(intent)
            }
        }
        EOF

    - name: Build Android App Compilation Engine
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
