name: Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Inject JitPack into Settings and App
      run: |
        # 1. अगर settings.gradle मौजूद है, तो उसके अंदर सुरक्षा मोड को बदलें और JitPack जोड़ें
        if [ -f settings.gradle ]; then
          sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_PROJECT/g' settings.gradle
          sed -i "s/mavenCentral()/mavenCentral()\n        maven { url 'https:\/\/jitpack.io' }/g" settings.gradle
        fi
        
        # 2. ऐप के मुख्य build.gradle के अंदर भी JitPack का पता जोड़ें
        if [ -f build.gradle ]; then
          sed -i "s/mavenCentral()/mavenCentral()\n        maven { url 'https:\/\/jitpack.io' }/g" build.gradle
        fi
        
        # 3. app फोल्डर के अंदर वाले build.gradle में भी बैकअप के लिए जोड़ें
        if [ -f app/build.gradle ]; then
          sed -i "s/mavenCentral()/mavenCentral()\n        maven { url 'https:\/\/jitpack.io' }/g" app/build.gradle
        fi

    - name: Build with Gradle
      run: gradle assembleDebug
