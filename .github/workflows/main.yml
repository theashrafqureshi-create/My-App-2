name: Build APK with Complete Integrated Engine
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        clean: true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configure Repositories and Inject Libraries
      run: |
        if [ -f settings.gradle ]; then
          sed -i 's/google()/google()\n        mavenCentral()/g' settings.gradle
        fi
        if [ -f build.gradle ]; then
          sed -i 's/google()/google()\n        mavenCentral()/g' build.gradle
        fi
        if [ -f app/build.gradle ]; then
          sed -i 's/minifyEnabled true/minifyEnabled false/g' app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' app/build.gradle
          sed -i 's/implementation.*com.github.tencent:mmkv.*/implementation files("mmkv.aar")/g' app/build.gradle
          sed -i 's/implementation.*com.tencent:mmkv.*/implementation files("mmkv.aar")/g' app/build.gradle
          sed -i '/dependencies {/a \    implementation "com.journeyapps:zxing-android-embedded:4.3.0"\n    implementation "com.google.zxing:core:3.4.1"' app/build.gradle
        fi

    - name: Configure Manifest with Complete Permissions
      run: |
        rm -f app/src/main/AndroidManifest.xml
        mkdir -p app/src/main
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://schemas.android.com/tools">
            
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.BIND_VPN_SERVICE" tools:ignore="ProtectedPermissions" />
            
            <application
                android:allowBackup="true"
                android:label="WhatsApp VPN Pro"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                
                <activity
                    android:name="com.v2ray.ang.ui.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                
                <activity
                    android:name="com.journeyapps.barcodescanner.CaptureActivity"
                    tools:node="replace"
                    android:screenOrientation="fullSensor"
                    android:stateNotNeeded="true"
                    android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                    android:windowSoftInputMode="stateAlwaysHidden"/>
                    
                <activity
                    android:name="com.v2ray.ang.ui.SettingsActivity"
                    android:exported="false" />
            </application>
        </manifest>
        EOF

    - name: Inject Layout Resources
      run: |
        mkdir -p app/src/main/res/layout
        
        # activity_main.xml
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#FAFAFA">
            <RelativeLayout
                android:id="@+id/topBar"
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:background="#075E54"
                android:elevation="4dp">
                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="WhatsApp VPN Pro"
                    android:textColor="#FFFFFF"
                    android:textSize="20sp"
                    android:textStyle="bold"
                    android:layout_centerVertical="true"
                    android:layout_marginStart="16dp"/>
                <ImageButton
                    android:id="@+id/btnSettings"
                    android:layout_width="48dp"
                    android:layout_height="48dp"
                    android:layout_alignParentEnd="true"
                    android:layout_centerVertical="true"
                    android:layout_marginEnd="8dp"
                    android:background="?attr/selectableItemBackgroundBorderless"
                    android:src="@android:drawable/ic_menu_manage"
                    android:tint="#FFFFFF"
                    android:contentDescription="Settings"/>
            </RelativeLayout>
            <TextView
                android:id="@+id/tvStatus"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="Status: Disconnected"
                android:textColor="#7F8C8D"
                android:textSize="20sp"
                android:textStyle="bold"
                android:layout_centerHorizontal="true"
                android:layout_below="@id/topBar"
                android:layout_marginTop="80dp"/>
            <Button
                android:id="@+id/btnConnect"
                android:layout_width="220dp"
                android:layout_height="220dp"
                android:text="START"
                android:textColor="#FFFFFF"
                android:textSize="22sp"
                android:textStyle="bold"
                android:layout_centerInParent="true"
                android:background="@android:drawable/toast_frame"
                android:backgroundTint="#25D366"
                android:elevation="8dp"/>
        </RelativeLayout>
        EOF

        # activity_settings.xml
        cat << 'EOF' > app/src/main/res/layout/activity_settings.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:background="#FFFFFF">
            <RelativeLayout
                android:layout_width="match_parent"
                android:layout_height="60dp"
                android:background="#075E54">
                <TextView
                    android:layout_width="wrap_content"
                    android:layout_height="wrap_content"
                    android:text="Server Setup"
                    android:textColor="#FFFFFF"
                    android:textSize="18sp"
                    android:textStyle="bold"
                    android:layout_centerInParent="true"/>
            </RelativeLayout>
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="vertical"
                android:padding="20dp">
                <EditText
                    android:id="@+id/etVpnLink"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:hint="Paste vmess:// configuration link"
                    android:inputType="textUri"
                    android:layout_marginBottom="20dp"
                    android:padding="12dp"
                    android:background="@android:drawable/edit_text"/>
                <Button
                    android:id="@+id/btnSaveLink"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="SAVE CONFIGURATION"
                    android:backgroundTint="#075E54"
                    android:textColor="#FFFFFF"
                    android:textStyle="bold"
                    android:layout_marginBottom="30dp"/>
                <Button
                    android:id="@+id/btnScanQr"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="📸 SCAN CONFIG QR"
                    android:backgroundTint="#25D366"
                    android:textColor="#FFFFFF"
                    android:textStyle="bold"
                    android:layout_marginBottom="12dp"/>
                <Button
                    android:id="@+id/btnChooseGallery"
                    android:layout_width="match_parent"
                    android:layout_height="wrap_content"
                    android:text="🖼️ IMPORT FROM GALLERY"
                    android:backgroundTint="#3498DB"
                    android:textColor="#FFFFFF"
                    android:textStyle="bold"/>
            </LinearLayout>
        </LinearLayout>
        EOF

        # dialog_welcome.xml
        cat << 'EOF' > app/src/main/res/layout/dialog_welcome.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:background="#FFFFFF"
            android:padding="20dp">
            <ImageButton
                android:id="@+id/btnCloseBanner"
                android:layout_width="40dp"
                android:layout_height="40dp"
                android:layout_alignParentEnd="true"
                android:layout_alignParentTop="true"
                android:background="?attr/selectableItemBackgroundBorderless"
                android:src="@android:drawable/ic_menu_close_clear_cancel"
                android:contentDescription="Close"/>
            <TextView
                android:id="@+id/dialogTitle"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="🚀 WhatsApp VPN Activated"
                android:textSize="18sp"
                android:textStyle="bold"
                android:textColor="#075E54"
                android:layout_alignParentStart="true"
                android:layout_toStartOf="@id/btnCloseBanner"
                android:layout_marginTop="8dp"
                android:layout_marginBottom="12dp"/>
            <TextView
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:layout_below="@id/dialogTitle"
                android:text="This application tunnels WhatsApp traffic through an encrypted proxy stream layer to ensure fast message ticking and clear calling."
                android:textColor="#2C3E50"
                android:textSize="14sp"/>
        </RelativeLayout>
        EOF

    - name: Inject Complete Programmed Logic Files
      run: |
        mkdir -p app/src/main/kotlin/com/v2ray/ang/ui
        mkdir -p app/src/main/kotlin/com/v2ray/ang/service
        mkdir -p app/src/main/kotlin/com/v2ray/ang/util

        # MainActivity.kt
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/ui/MainActivity.kt
        package com.v2ray.ang.ui
        import android.content.Intent
        import android.net.VpnService
        import android.os.Bundle
        import android.view.LayoutInflater
        import android.widget.Button
        import android.widget.ImageButton
        import android.widget.TextView
        import android.widget.Toast
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.appcompat.app.AlertDialog
        import androidx.appcompat.app.AppCompatActivity
        import com.v2ray.ang.R
        import com.v2ray.ang.service.V2rayServiceManager
        import com.v2ray.ang.util.AngConfigManager
        class MainActivity : AppCompatActivity() {
            private var isConnected = false
            private lateinit var btnConnect: Button
            private lateinit var tvStatus: TextView
            private lateinit var btnSettings: ImageButton
            
            private val vpnLauncher = registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                if (result.resultCode == RESULT_OK) {
                    activateVpnCore()
                } else {
                    Toast.makeText(this, "VPN Authorization Denied!", Toast.LENGTH_SHORT).show()
                }
            }
            
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
                btnConnect = findViewById(R.id.btnConnect)
                tvStatus = findViewById(R.id.tvStatus)
                btnSettings = findViewById(R.id.btnSettings)
                
                btnSettings.setOnClickListener {
                    startActivity(Intent(this, SettingsActivity::class.java))
                }
                
                btnConnect.setOnClickListener {
                    if (!isConnected) {
                        val sharedPreferences = getSharedPreferences("VPN_SETTINGS", MODE_PRIVATE)
                        val savedLink = sharedPreferences.getString("SERVER_LINK", "")
                        
                        if (savedLink.isNullOrEmpty()) {
                            Toast.makeText(this, "Configure a Vmess Server Profile First!", Toast.LENGTH_LONG).show()
                            startActivity(Intent(this, SettingsActivity::class.java))
                            return@setOnClickListener
                        }
                        
                        AngConfigManager.importConfig(this, savedLink)
                        val intent = VpnService.prepare(this)
                        if (intent != null) {
                            vpnLauncher.launch(intent)
                        } else {
                            activateVpnCore()
                        }
                    } else {
                        deactivateVpnCore()
                    }
                }
                showWelcomeBanner()
            }
            
            private fun activateVpnCore() {
                try {
                    V2rayServiceManager.startV2rayServer(this)
                    isConnected = true
                    tvStatus.text = "Status: Connected (Tunnel Active)"
                    tvStatus.setTextColor(android.graphics.Color.parseColor("#25D366"))
                    btnConnect.text = "STOP"
                    Toast.makeText(this, "Proxy Stream Successfully Hooked!", Toast.LENGTH_SHORT).show()
                } catch(e: Exception) {}
            }
            
            private fun deactivateVpnCore() {
                try {
                    V2rayServiceManager.stopV2rayServer(this)
                } catch(e: Exception) {}
                isConnected = false
                tvStatus.text = "Status: Disconnected"
                tvStatus.setTextColor(android.graphics.Color.parseColor("#7F8C8D"))
                btnConnect.text = "START"
                Toast.makeText(this, "Tunnel Stopped", Toast.LENGTH_SHORT).show()
            }
            
            private fun showWelcomeBanner() {
                try {
                    val dialogView = LayoutInflater.from(this).inflate(R.layout.dialog_welcome, null)
                    val alertDialog = AlertDialog.Builder(this).setView(dialogView).create()
                    dialogView.findViewById<ImageButton>(R.id.btnCloseBanner).setOnClickListener {
                        alertDialog.dismiss()
                    }
                    alertDialog.show()
                } catch (e: Exception) {}
            }
        }
        EOF

        # SettingsActivity.kt
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/ui/SettingsActivity.kt
        package com.v2ray.ang.ui
        import android.Manifest
        import android.content.Intent
        import android.content.pm.PackageManager
        import android.graphics.BitmapFactory
        import android.net.Uri
        import android.os.Bundle
        import android.provider.MediaStore
        import android.widget.Button
        import android.widget.EditText
        import android.widget.Toast
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.content.ContextCompat
        import com.google.zxing.*
        import com.google.zxing.common.HybridBinarizer
        import com.journeyapps.barcodescanner.ScanContract
        import com.journeyapps.barcodescanner.ScanOptions
        import com.v2ray.ang.R
        import java.io.InputStream
        class SettingsActivity : AppCompatActivity() {
            private lateinit var etVpnLink: EditText
            private val barcodeLauncher = registerForActivityResult(ScanContract()) { result ->
                if (result.contents != null) {
                    etVpnLink.setText(result.contents)
                    Toast.makeText(this, "QR Code Processed Successfully!", Toast.LENGTH_SHORT).show()
                }
            }
            private val pickImageLauncher = registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                if (result.resultCode == RESULT_OK) {
                    val imageUri = result.data?.data
                    if (imageUri != null) {
                        try {
                            val inputStream: InputStream? = contentResolver.openInputStream(imageUri)
                            val bitmap = BitmapFactory.decodeStream(inputStream)
                            val width = bitmap.width
                            val height = bitmap.height
                            val pixels = IntArray(width * height)
                            bitmap.getPixels(pixels, 0, width, 0, 0, width, height)
                            val source = RGBLuminanceSource(width, height, pixels)
                            val binarizer = HybridBinarizer(source)
                            val binaryBitmap = BinaryBitmap(binarizer)
                            val reader: Reader = MultiFormatReader()
                            val decodingResult = reader.decode(binaryBitmap)
                            etVpnLink.setText(decodingResult.text)
                            Toast.makeText(this, "Gallery Configuration Loaded!", Toast.LENGTH_SHORT).show()
                        } catch (e: Exception) {
                            Toast.makeText(this, "Invalid Config QR Asset Selected.", Toast.LENGTH_LONG).show()
                        }
                    }
                }
            }
            private val requestGalleryPermissionLauncher = registerForActivityResult(ActivityResultContracts.RequestPermission()) { isGranted ->
                if (isGranted) openGallery()
            }
            private val requestCameraPermissionLauncher = registerForActivityResult(ActivityResultContracts.RequestPermission()) { isGranted ->
                if (isGranted) openCameraScanner()
            }
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_settings)
                etVpnLink = findViewById(R.id.etVpnLink)
                val btnSaveLink = findViewById<Button>(R.id.btnSaveLink)
                val btnScanQr = findViewById<Button>(R.id.btnScanQr)
                val btnChooseGallery = findViewById<Button>(R.id.btnChooseGallery)
                val sharedPreferences = getSharedPreferences("VPN_SETTINGS", MODE_PRIVATE)
                
                etVpnLink.setText(sharedPreferences.getString("SERVER_LINK", ""))
                
                btnSaveLink.setOnClickListener {
                    val link = etVpnLink.text.toString().trim()
                    if (link.isNotEmpty()) {
                        sharedPreferences.edit()
                            .putString("SERVER_LINK", link)
                            .apply()
                        Toast.makeText(this, "Configuration Profile Updated", Toast.LENGTH_SHORT).show()
                        finish()
                    }
                }
                btnScanQr.setOnClickListener {
                    if (ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA) == PackageManager.PERMISSION_GRANTED) {
                        openCameraScanner()
                    } else {
                        requestCameraPermissionLauncher.launch(Manifest.permission.CAMERA)
                    }
                }
                btnChooseGallery.setOnClickListener {
                    val permission = if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.TIRAMISU) {
                        Manifest.permission.READ_MEDIA_IMAGES
                    } else {
                        Manifest.permission.READ_EXTERNAL_STORAGE
                    }
                    if (ContextCompat.checkSelfPermission(this, permission) == PackageManager.PERMISSION_GRANTED) {
                        openGallery()
                    } else {
                        requestGalleryPermissionLauncher.launch(permission)
                    }
                }
            }
            private fun openGallery() {
                val galleryIntent = Intent(Intent.ACTION_PICK, MediaStore.Images.Media.EXTERNAL_CONTENT_URI)
                pickImageLauncher.launch(galleryIntent)
            }
            private fun openCameraScanner() {
                val options = ScanOptions()
                options.setDesiredBarcodeFormats(ScanOptions.QR_CODE)
                options.setPrompt("Align the V2ray/Vmesh Server QR Code")
                options.setCameraId(0)
                options.setBeepEnabled(false)
                barcodeLauncher.launch(options)
            }
        }
        EOF
        
        # V2rayServiceManager.kt [ओरिजिनल कोर सर्विस इंजन हुक]
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/service/V2rayServiceManager.kt
        package com.v2ray.ang.service
        
        import android.content.Context
        import android.content.Intent
        
        object V2rayServiceManager {
            fun startV2rayServer(context: Context) {
                try {
                    // सीधे v2rayNG की असली VPN सर्विस को कॉल करना जिससे एंड्रॉइड चाबी का निशान तुरंत दे दे
                    val intentReal = Intent(context, Class.forName("com.v2ray.ang.service.VpnService"))
                    intentReal.putExtra("COMMAND", "START")
                    context.startService(intentReal)
                } catch(ex: Exception) {
                    ex.printStackTrace()
                }
            }
            fun stopV2rayServer(context: Context) {
                try {
                    val intentReal = Intent(context, Class.forName("com.v2ray.ang.service.VpnService"))
                    intentReal.putExtra("COMMAND", "STOP")
                    context.startService(intentReal)
                } catch(ex: Exception) {
                    ex.printStackTrace()
                }
            }
        }
        EOF
        
        # AngConfigManager.kt [MASTER INTEGRATION ENGINE]
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/util/AngConfigManager.kt
        package com.v2ray.ang.util
        
        import android.content.Context
        import java.lang.reflect.Method
        
        object AngConfigManager {
            fun importConfig(context: Context, serverLink: String): Boolean {
                if (serverLink.isNullOrEmpty()) return false
                return try {
                    val clazz = Class.forName("com.v2ray.ang.util.MmkvManager")
                    val instance = clazz.getField("INSTANCE").get(null)
                    val method = clazz.getDeclaredMethod("importConfig", String::class.java)
                    method.isAccessible = true
                    val guid = method.invoke(instance, serverLink) as String
                    
                    val mainClazz = Class.forName("com.v2ray.ang.util.MmkvManager")
                    val setMethod = mainClazz.getDeclaredMethod("selectServer", String::class.java)
                    setMethod.isAccessible = true
                    setMethod.invoke(instance, guid)
                    
                    true
                } catch (e: Exception) {
                    try {
                        val clazz = Class.forName("com.v2ray.ang.util.MmkvManager")
                        val method = clazz.getMethod("importConfig", String::class.java)
                        method.invoke(null, serverLink)
                        true
                    } catch(ex: Exception) {
                        false
                    }
                }
            }
        }
        EOF

    - name: Setup Gradle Build Engine
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Compile and Build APK Directly
      run: gradle assembleDebug --no-build-cache

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apk
