name: Build WhatsApp VPN Debug APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Production Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare Dynamic Debug Artifact
        run: |
          mkdir -p debug_output
          cp app/build/outputs/apk/debug/app-debug.apk debug_output/WhatsApp_VPN_Debug.apk || echo "APK path format varied"

      - name: Upload WhatsApp VPN Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WhatsApp_VPN_Debug
          path: debug_output/WhatsApp_VPN_Debug.apk
          if-no-files-found: error
          retention-days: 7
