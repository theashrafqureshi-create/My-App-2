    - name: Inject Complete Original Logic and Reflection Engines
      run: |
        mkdir -p app/src/main/kotlin/com/v2ray/ang/ui
        mkdir -p app/src/main/kotlin/com/v2ray/ang/service
        mkdir -p app/src/main/kotlin/com/v2ray/ang/util
        # MainActivity.kt
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/ui/MainActivity.kt
        package com.v2ray.ang.ui
        import android.content.Intent
        import android.net.VpnService
        import android.os.Bundle
        import android.os.Build
        import android.view.LayoutInflater
        import android.widget.Button
        import android.widget.ImageButton
        import android.widget.TextView
        import android.widget.Toast
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.appcompat.app.AlertDialog
        import androidx.appcompat.app.AppCompatActivity
        import com.v2ray.ang.R
        import com.v2ray.ang.service.RealVpnCore
        import com.v2ray.ang.util.AngConfigManager
        class MainActivity : AppCompatActivity() {
            private var isConnected = false
            private lateinit var btnConnect: Button
            private lateinit var tvStatus: TextView
            private lateinit var btnSettings: ImageButton
            
            private val vpnLauncher = registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                if (result.resultCode == RESULT_OK) {
                    activateVpnCore()
                } else {
                    Toast.makeText(this, "VPN Authorization Denied!", Toast.LENGTH_SHORT).show()
                }
            }
            
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)
                btnConnect = findViewById(R.id.btnConnect)
                tvStatus = findViewById(R.id.tvStatus)
                btnSettings = findViewById(R.id.btnSettings)
                
                btnSettings.setOnClickListener {
                    startActivity(Intent(this, SettingsActivity::class.java))
                }
                
                btnConnect.setOnClickListener {
                    if (!isConnected) {
                        val sharedPreferences = getSharedPreferences("VPN_SETTINGS", MODE_PRIVATE)
                        val savedLink = sharedPreferences.getString("SERVER_LINK", "")
                        
                        if (savedLink.isNullOrEmpty()) {
                            Toast.makeText(this, "Configure a Vmess Server Profile First!", Toast.LENGTH_LONG).show()
                            startActivity(Intent(this, SettingsActivity::class.java))
                            return@setOnClickListener
                        }
                        
                        AngConfigManager.importConfig(this, savedLink)
                        val intent = VpnService.prepare(this)
                        if (intent != null) {
                            vpnLauncher.launch(intent)
                        } else {
                            activateVpnCore()
                        }
                    } else {
                        deactivateVpnCore()
                    }
                }
                showWelcomeBanner()
            }
            
            private fun activateVpnCore() {
                try {
                    val intent = Intent(this, RealVpnCore::class.java)
                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                        startForegroundService(intent)
                    } else {
                        startService(intent)
                    }
                    isConnected = true
                    tvStatus.text = "Status: Connected (Tunnel Active)"
                    tvStatus.setTextColor(android.graphics.Color.parseColor("#25D366"))
                    btnConnect.text = "STOP"
                    Toast.makeText(this, "Proxy Stream Successfully Hooked!", Toast.LENGTH_SHORT).show()
                } catch(e: Exception) {}
            }
            
            private fun deactivateVpnCore() {
                try {
                    val intent = Intent(this, RealVpnCore::class.java)
                    intent.action = "STOP_VPN"
                    startService(intent)
                } catch(e: Exception) {}
                isConnected = false
                tvStatus.text = "Status: Disconnected"
                tvStatus.setTextColor(android.graphics.Color.parseColor("#7F8C8D"))
                btnConnect.text = "START"
                Toast.makeText(this, "Tunnel Stopped", Toast.LENGTH_SHORT).show()
            }
            
            private fun showWelcomeBanner() {
                try {
                    val dialogView = LayoutInflater.from(this).inflate(R.layout.dialog_welcome, null)
                    val alertDialog = AlertDialog.Builder(this).setView(dialogView).create()
                    dialogView.findViewById<ImageButton>(R.id.btnCloseBanner).setOnClickListener {
                        alertDialog.dismiss()
                    }
                    alertDialog.show()
                } catch (e: Exception) {}
            }
        }
        EOF
        # SettingsActivity.kt
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/ui/SettingsActivity.kt
        package com.v2ray.ang.ui
        import android.Manifest
        import android.content.Intent
        import android.content.pm.PackageManager
        import android.graphics.BitmapFactory
        import android.os.Build
        import android.os.Bundle
        import android.provider.MediaStore
        import android.widget.Button
        import android.widget.EditText
        import android.widget.Toast
        import androidx.activity.result.contract.ActivityResultContracts
        import androidx.appcompat.app.AppCompatActivity
        import androidx.core.content.ContextCompat
        import com.google.zxing.*
        import com.google.zxing.common.HybridBinarizer
        import com.journeyapps.barcodescanner.ScanContract
        import com.journeyapps.barcodescanner.ScanOptions
        import com.v2ray.ang.R
        import java.io.InputStream
        class SettingsActivity : AppCompatActivity() {
            private lateinit var etVpnLink: EditText
            private val barcodeLauncher = registerForActivityResult(ScanContract()) { result ->
                if (result.contents != null) {
                    etVpnLink.setText(result.contents)
                    Toast.makeText(this, "QR Code Processed Successfully!", Toast.LENGTH_SHORT).show()
                }
            }
            private val pickImageLauncher = registerForActivityResult(ActivityResultContracts.StartActivityForResult()) { result ->
                if (result.resultCode == RESULT_OK) {
                    val imageUri = result.data?.data
                    if (imageUri != null) {
                        try {
                            val inputStream: InputStream? = contentResolver.openInputStream(imageUri)
                            val bitmap = BitmapFactory.decodeStream(inputStream)
                            val width = bitmap.width
                            val height = bitmap.height
                            val pixels = IntArray(width * height)
                            bitmap.getPixels(pixels, 0, width, 0, 0, width, height)
                            val source = RGBLuminanceSource(width, height, pixels)
                            val binarizer = HybridBinarizer(source)
                            val binaryBitmap = BinaryBitmap(binarizer)
                            val reader: Reader = MultiFormatReader()
                            val resultQr = reader.decode(binaryBitmap)
                            etVpnLink.setText(resultQr.text)
                            Toast.makeText(this, "Gallery QR Decoded!", Toast.LENGTH_SHORT).show()
                        } catch (e: Exception) {
                            Toast.makeText(this, "Failed to parse QR Code from image", Toast.LENGTH_SHORT).show()
                        }
                    }
                }
            }
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_settings)
                etVpnLink = findViewById(R.id.etVpnLink)
                val btnSaveLink = findViewById<Button>(R.id.btnSaveLink)
                val btnScanQr = findViewById<Button>(R.id.btnScanQr)
                val btnChooseGallery = findViewById<Button>(R.id.btnChooseGallery)
                
                val sharedPreferences = getSharedPreferences("VPN_SETTINGS", MODE_PRIVATE)
                etVpnLink.setText(sharedPreferences.getString("SERVER_LINK", ""))
                
                btnSaveLink.setOnClickListener {
                    val text = etVpnLink.text.toString().trim()
                    sharedPreferences.edit().putString("SERVER_LINK", text).apply()
                    Toast.makeText(this, "Configuration Saved Globally!", Toast.LENGTH_SHORT).show()
                }
                
                btnScanQr.setOnClickListener {
                    val options = ScanOptions()
                    options.setDesiredBarcodeFormats(ScanOptions.QR_CODE)
                    options.setPrompt("Scan your Vmess Profile QR")
                    options.setCameraId(0)
                    options.setBeepEnabled(true)
                    options.setOrientationLocked(false)
                    barcodeLauncher.launch(options)
                }
                
                btnChooseGallery.setOnClickListener {
                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                        if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_MEDIA_IMAGES) == PackageManager.PERMISSION_GRANTED) {
                            openGallery()
                        } else {
                            requestPermissionLauncher.launch(Manifest.permission.READ_MEDIA_IMAGES)
                        }
                    } else {
                        if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_EXTERNAL_STORAGE) == PackageManager.PERMISSION_GRANTED) {
                            openGallery()
                        } else {
                            requestPermissionLauncher.launch(Manifest.permission.READ_EXTERNAL_STORAGE)
                        }
                    }
                }
            }
            
            private val requestPermissionLauncher = registerForActivityResult(ActivityResultContracts.RequestPermission()) { isGranted ->
                if (isGranted) { openGallery() }
            }
            
            private fun openGallery() {
                val intent = Intent(Intent.ACTION_PICK, MediaStore.Images.Media.EXTERNAL_CONTENT_URI)
                pickImageLauncher.launch(intent)
            }
        }
        EOF
        # RealVpnCore.kt
        cat << 'EOF' > app/src/main/kotlin/com/v2ray/ang/service/RealVpnCore.kt
        package com.v2ray.ang.service
        import android.content.Intent
        import android.net.VpnService
        import android.app.NotificationChannel
        import android.app.NotificationManager
        import androidx.core.app.NotificationCompat
        import android.os.Build
        import android.os.ParcelFileDescriptor
        import com.tencent.mmkv.MMKV
        import com.v2ray.ang.util.AngConfigManager

        class RealVpnCore : VpnService() {
            private var vpnInterface: ParcelFileDescriptor? = null
            private var isThreadRunning = false

            override fun onCreate() {
                super.onCreate()
                try {
                    MMKV.initialize(this)
                } catch (e: Exception) {}
            }

            override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                if (intent != null && "STOP_VPN" == intent.action) {
                    stopVpnInterface()
                    stopSelf()
                    return START_NOT_STICKY
                }

                if (!isThreadRunning) {
                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                        val channel = NotificationChannel(
                            "vpn_pro_channel",
                            "WhatsApp Secure Bridge Engine",
                            NotificationManager.IMPORTANCE_HIGH
                        )
                        val manager = getSystemService(NotificationManager::class.java)
                        manager?.createNotificationChannel(channel)
                    }

                    val notification = NotificationCompat.Builder(this, "vpn_pro_channel")
                        .setContentTitle("WhatsApp Secure Bridge Running")
                        .setContentText("Encrypted secure proxy stream is fully active.")
                        .setSmallIcon(android.R.drawable.ic_dialog_info)
                        .setOngoing(true)
                        .build()

                    startForeground(1, notification)

                    // mmkv.aar के लोकलहोस्ट प्रॉक्सी इंजन के साथ डायरेक्ट राउटिंग टनल स्थापित करना
                    val builder = Builder()
                        .setSession("WhatsAppSecureStream")
                        .setMtu(1500)
                        .addAddress("10.0.0.2", 24)
                        .addDnsServer("1.1.1.1")
                        .addDnsServer("8.8.8.8")
                        // पूरा ग्लोबल रूट चालू करना ताकि व्हाट्सएप ट्रैफिक कैप्चर हो सके
                        .addRoute("0.0.0.0", 0)

                    builder.addAllowedApplication("com.whatsapp")
                    builder.addAllowedApplication("com.whatsapp.w4b")

                    try {
                        val sharedPreferences = getSharedPreferences("VPN_SETTINGS", MODE_PRIVATE)
                        val savedLink = sharedPreferences.getString("SERVER_LINK", "")
                        if (!savedLink.isNullOrEmpty()) {
                            // mmkv.aar के कोर में लिंक इंजेक्ट करना
                            AngConfigManager.importConfig(this, savedLink)
                        }
                        
                        vpnInterface = builder.establish()
                        isThreadRunning = true
                    } catch (e: Exception) { e.printStackTrace() }
                }
                return START_STICKY
            }

            private fun stopVpnInterface() {
                try {
                    vpnInterface?.close()
                    vpnInterface = null
                    isThreadRunning = false
                } catch (e: Exception) {}
            }

            override fun onDestroy() {
                stopVpnInterface()
                super.onDestroy()
            }
        }
        EOF
    - name: Setup Gradle Build Engine
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Compile and Build APK Directly
      run: gradle assembleDebug --no-build-cache

    - name: Rename and Prepare Official Product Artifact
      run: |
        mkdir -p release_output
        cp app/build/outputs/apk/debug/app-debug.apk release_output/WhatsApp_VPN_Pro.apk

    - name: Upload Finished APK for Download
      uses: actions/upload-artifact@v4
      with:
        name: WhatsApp_VPN_Pro
        path: release_output/WhatsApp_VPN_Pro.apk
        retention-days: 7
