plugins {
    id 'com.android.application'
    // अगर यहाँ kotlin-android या कोई और प्लगइन है तो वो रहेगा, पर अंत में ब्रैकेट बंद होना चाहिए
}

android {
    namespace 'com.ashraf.myapp' // जो भी तुम्हारा पैकेज नेम है
    compileSdk 34
    
    defaultConfig {
        applicationId "com.ashraf.myapp"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    // ... बाकी कोड नीचे रहेगा
}

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // // बारकोड स्कैनर और गैलरी QR इंजन चलाने के लिए ये दोनों लाइनें जोड़ी हैं:
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
    implementation 'com.google.zxing:core:3.4.1'

    // // Shadowsocks VPN इंजन के लिए MMKV स्थानीय स्टोरेज लिंक:
    implementation fileTree(dir: 'libs', include: ['*.aar'])
}
