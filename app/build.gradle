// नया सुधरा हुआ कोड
plugins {
    id 'com.android.application'  // <--- यहाँ से 'version' वाला हिस्सा पूरी तरह हटा दिया
    // बाकी प्लगइन्स...
}

android {
    namespace 'com.ashraf.whatsappvpn'
    compileSdk 34

    defaultConfig {
        applicationId "com.ashraf.whatsappvpn"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            shrinkResources false
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'

    // // बारकोड स्कैनर और गैलरी QR इंजन चलाने के लिए ये दोनों लाइनें जोड़ी हैं:
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
    implementation 'com.google.zxing:core:3.4.1'

    // // Shadowsocks VPN इंजन के लिए MMKV स्थानीय स्टोरेज लिंक:
    implementation fileTree(dir: 'libs', include: ['*.aar'])
}
